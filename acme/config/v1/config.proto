syntax = "proto3";

package acme.config.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service ConfigService {
  // CreateConfig 创建新的配置集合
  rpc CreateConfig(CreateConfigRequest) returns (CreateConfigResponse) {
    option (google.api.http) = {
      post: "/v1/config"
      body: "*"
    };
  }

  // GetConfigList 分页查询配置列表
  rpc GetConfigList(GetConfigListRequest) returns (GetConfigListResponse) {
    option (google.api.http) = {
      get: "/v1/config/list"
    };
  }

  // GetConfigInfo 获取配置信息
  rpc GetConfigInfo(GetConfigInfoRequest) returns (GetConfigInfoResponse) {
    option (google.api.http) = {
      get: "/v1/config/info"
    };
  }

  // UpdateConfig 更新配置内容
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse) {
    option (google.api.http) = {
      put: "/v1/config"
      body: "*"
    };
  }

  // DeleteConfig 删除配置
  rpc DeleteConfig(DeleteConfigRequest) returns (DeleteConfigResponse) {
    option (google.api.http) = {
      delete: "/v1/config"
    };
  }
}

message Config {
  // 配置名称
  string name = 1;
  // 配置说明
  string description = 2;
  // 标签列表
  repeated string tags = 3;

  // 配置组
  string group = 4;
  // 环境
  string env = 5;
  // 配置项键名
  string key = 6;
  // 配置版本
  string version = 7;
  // 是否启用加密
  bool encrypted = 8;

  string app_id = 9;
  string tenant_id = 10;

  string id = 11;
  string created_at = 12;
  string updated_at = 13;

  string creator_id = 14;
  string updater_id = 15;
}

message CreateConfigRequest {
  // 配置名称
  string name = 1 [(buf.validate.field).required = true, (buf.validate.field).string.max_len = 500];
  // 配置说明
  string description = 2 [(buf.validate.field).string.max_len = 5000];
  // 标签列表
  repeated string tags = 3 [(buf.validate.field).repeated.max_items = 100];

  // 配置组
  string group = 4 [(buf.validate.field).required = true];
  // 环境
  string env = 5 [(buf.validate.field).required = true];
  // 配置项键名
  string key = 6 [(buf.validate.field).required = true];
  // 是否启用加密
  bool encrypted = 7;

  string app_id = 8 [(buf.validate.field).string.uuid = true];
  string tenant_id = 9 [(buf.validate.field).string.uuid = true];
}
message CreateConfigResponse {}

message GetConfigListRequest {
  uint64 page = 1;
  uint64 page_size = 2;
  string keyword = 3;

  // 配置组
  string group = 4;
  // 环境
  string env = 5;
  // 配置项
  string key = 6;
}
message GetConfigListResponse {
  int64 total = 1;
  repeated Config list = 2;
}

message GetConfigInfoRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message GetConfigInfoResponse {
  Config data = 1;
}

message UpdateConfigRequest {
  // 配置名称
  string name = 1 [(buf.validate.field).required = true, (buf.validate.field).string.max_len = 500];
  // 配置说明
  string description = 2 [(buf.validate.field).string.max_len = 5000];
  // 标签列表
  repeated string tags = 3 [(buf.validate.field).repeated.max_items = 100];

  string id = 11 [(buf.validate.field).string.uuid = true];
}
message UpdateConfigResponse {}

message DeleteConfigRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message DeleteConfigResponse {}

// 定义 Swagger 元信息
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "ConfigService";
    version: "1.0.0";
    description: "配置服务";
  };
  security_definitions: {
    security: {
      key: "Authorization"
      value: {
        name: "Authorization"
        in: IN_HEADER
        type: TYPE_API_KEY
      }
    }
  }
  consumes: "application/json";
  produces: "application/json";
};
