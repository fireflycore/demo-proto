syntax = "proto3";

package acme.config.v1;

import "acme/basic/v1/tls.proto";

// Mongo 定义 MongoDB 连接配置。
message Mongo {
  // MongoDB 地址。
  string address = 1;
  // MongoDB 数据库名称。
  string database = 2;
  // MongoDB 用户名。
  string username = 3;
  // MongoDB 密码。
  string password = 4;
  // MongoDB TLS 配置。
  basic.v1.TLS tls = 5;
  // 最大打开连接数。
  uint32 max_open_connects = 6;
  // 最大空闲连接数。
  uint32 max_idle_connects = 7;
  // 连接最大生命周期，单位为秒。
  uint32 conn_max_life_time = 8;
  // 是否启用日志输出。
  bool logger = 9;
}
