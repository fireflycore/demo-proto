syntax = "proto3";

package acme.config.v1;

import "acme/basic/v1/tls.proto";

// GormType 定义 GORM 支持的数据库类型。
enum GormType {
  // GORM_TYPE_UNSPECIFIED 表示未指定数据库类型。
  GORM_TYPE_UNSPECIFIED = 0;
  // GORM_TYPE_POSTGRES 表示 PostgreSQL。
  GORM_TYPE_POSTGRES = 1;
  // GORM_TYPE_ORACLE 表示 Oracle。
  GORM_TYPE_ORACLE = 2;
  // GORM_TYPE_SQLITE 表示 SQLite。
  GORM_TYPE_SQLITE = 3;
  // GORM_TYPE_MYSQL 表示 MySQL。
  GORM_TYPE_MYSQL = 4;
  // GORM_TYPE_MSSQL 表示 Microsoft SQL Server。
  GORM_TYPE_MSSQL = 5;
}

// GORM 定义关系型数据库连接配置。
message GORM {
  // 数据库类型。
  GormType type = 1;
  // 数据库连接地址。
  string address = 2;
  // 数据库名称。
  string database = 3;
  // 数据库用户名。
  string username = 4;
  // 数据库密码。
  string password = 5;
  // 数据库 TLS 配置。
  basic.v1.TLS tls = 6;
  // 最大打开连接数。
  uint32 max_open_connects = 7;
  // 最大空闲连接数。
  uint32 max_idle_connects = 8;
  // 连接最大生命周期，单位为秒。
  uint32 conn_max_life_time = 9;
  // 是否启用 SQL 日志。
  bool logger = 10;
  // 是否启用预处理语句。
  bool prepare_stmt = 11;
  // 是否跳过默认事务。
  bool skip_default_transaction = 12;
}
