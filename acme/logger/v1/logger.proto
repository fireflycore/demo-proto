syntax="proto3";

package acme.logger.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "acme/logger/client/v1/client.proto";
import "acme/logger/server/v1/server.proto";
import "acme/logger/access/v1/access.proto";
import "acme/logger/operation/v1/operation.proto";

service LoggerService {
  // 获取链路日志列表
  rpc GetTraceLogList(GetTraceLogListRequest) returns (GetTraceLogListResponse) {
    option (google.api.http) = {
      get: "/v1/logger/trace/list"
    };
  };
}

message TraceLogList {
  // 客户端日志
  repeated client.v1.Client client_list = 1;
  // 访问日志
  repeated access.v1.LogItem access_list = 2;
  // 操作日志
  repeated operation.v1.Operation operation_list = 3;
  // 服务端日志
  repeated server.v1.Server server_list = 4;
}
message GetTraceLogListRequest {
  // 链路id
  string trace_id = 4;
}
message GetTraceLogListResponse {
  uint32 code = 1;
  string message = 2;
  // 空值无用意
  TraceLogList data = 3;
}

// 定义Swagger元信息
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "LoggerService";
    version: "1.0.0";
    description: "日志服务";
    contact: {
      name: "梨花炖海棠";
      url: "https://github.com/lhdhtrc";
      email: "lhdhtr@gmail.com";
    };
  };
  security_definitions: {
    security: {
      key: "Authorization"
      value: {
        name: "Authorization"
        in: IN_HEADER
        type: TYPE_API_KEY
      }
    }
  }
  host: "192.168.1.100:10000";
  schemes: [HTTP];
  consumes: "application/json";
  produces: "application/json";
};
